apis:
  - aid: nudge-security:rest-api
    name: Nudge Security API
    description: >-
      The Nudge Security REST API enables programmatic access to retrieve data
      about apps, accounts, security events, fields, user groups, labels, and
      notifications. It supports integration with SIEM, SOAR, and ticketing
      systems, and allows management of custom fields and classifications. The
      API is rate limited to 1200 requests per 5-minute period.
    humanURL: https://help.nudgesecurity.com/en/articles/8890697-getting-started-with-the-nudge-security-api
