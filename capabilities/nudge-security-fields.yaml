naftiko: 1.0.0-alpha2
info:
  label: Nudge Security API — Fields
  description: 'Nudge Security API — Fields. 2 operations. Lead operation: Search fields. Self-contained Naftiko capability
    covering one Nudge Security business surface.'
  tags:
  - Nudge Security
  - Fields
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    NUDGE_SECURITY_API_KEY: NUDGE_SECURITY_API_KEY
capability:
  consumes:
  - type: http
    namespace: nudge-security-fields
    baseUri: https://api.nudgesecurity.io/api/1.0
    description: Nudge Security API — Fields business capability. Self-contained, no shared references.
    resources:
    - name: fields
      path: /fields
      operations:
      - name: get
        method: GET
        description: Search fields
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
      - name: post
        method: POST
        description: Create field
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.NUDGE_SECURITY_API_KEY}}'
  exposes:
  - type: rest
    namespace: nudge-security-fields-rest
    port: 8080
    description: REST adapter for Nudge Security API — Fields. One Spectral-compliant resource per consumed operation, prefixed
      with /v1.
    resources:
    - path: /v1/fields
      name: fields
      description: REST surface for fields.
      operations:
      - method: GET
        name: get
        description: Search fields
        call: nudge-security-fields.get
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: post
        description: Create field
        call: nudge-security-fields.post
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: nudge-security-fields-mcp
    port: 9090
    transport: http
    description: MCP adapter for Nudge Security API — Fields. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: search-fields
      description: Search fields
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: nudge-security-fields.get
      outputParameters:
      - type: object
        mapping: $.
    - name: create-field
      description: Create field
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: nudge-security-fields.post
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
